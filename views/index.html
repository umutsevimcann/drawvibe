<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawvibe - Gerçek Zamanlı Çizim Platformu</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="welcome-screen" class="welcome-container">
    <div class="logo-container">
      <h1 class="logo">Drawvibe</h1>
      <p class="tagline">Birlikte çiz, yaratıcılığını paylaş!</p>
    </div>
    
    <div class="login-container">
      <div class="form-group">
        <label for="welcome-username">Kullanıcı Adın:</label>
        <input type="text" id="welcome-username" placeholder="Nasıl görünmek istersin?" maxlength="20">
      </div>
      
      <div class="form-group">
        <label for="room-id">Oda Kodu:</label>
        <input type="text" id="room-id" placeholder="Yeni oda için boş bırak">
        <p class="hint">Varolan bir odaya katılmak için kod gir veya yeni bir oda oluştur.</p>
      </div>
      
      <button id="join-button" class="join-button">
        <i class="fas fa-paint-brush"></i> Çizime Başla
      </button>
    </div>
  </div>

  <div id="drawing-app" class="app-container hidden">
    <header>
      <div class="header-left">
        <h1>Drawvibe</h1>
        <div class="room-info">
          <span>Oda: </span>
          <span id="current-room-id" class="room-id"></span>
          <button id="copy-room-button" class="small-button" title="Oda kodunu kopyala">
            <i class="fas fa-copy"></i>
          </button>
        </div>
      </div>
      
      <div class="user-info">
        <div class="online-users">
          <i class="fas fa-users"></i>
          <span id="user-count">0</span> Çevrimiçi
        </div>
        <div class="username-container">
          <span id="current-username"></span>
        </div>
      </div>
    </header>

    <div class="tools-container">
      <div class="drawing-tools">
        <div class="tool-group">
          <button id="brush-tool" class="tool-button tool-select active" data-tool="brush" title="Kalem">
            <i class="fas fa-pen"></i>
          </button>
          <button id="eraser-tool" class="tool-button tool-select" data-tool="eraser" title="Silgi">
            <i class="fas fa-eraser"></i>
          </button>
          <button id="line-tool" class="tool-button tool-select" data-tool="line" title="Çizgi">
            <i class="fas fa-minus"></i>
          </button>
          <button id="rect-tool" class="tool-button tool-select" data-tool="rect" title="Dikdörtgen">
            <i class="far fa-square"></i>
          </button>
          <button id="circle-tool" class="tool-button tool-select" data-tool="circle" title="Daire">
            <i class="far fa-circle"></i>
          </button>
        </div>
      </div>

      <div class="color-tools">
        <label for="color-picker"><i class="fas fa-palette"></i> Renk:</label>
        <input type="color" id="color-picker" value="#000000">
        
        <div class="color-presets">
          <div class="color-preset" data-color="#000000" style="background-color: #000000;"></div>
          <div class="color-preset" data-color="#FF0000" style="background-color: #FF0000;"></div>
          <div class="color-preset" data-color="#0000FF" style="background-color: #0000FF;"></div>
          <div class="color-preset" data-color="#00FF00" style="background-color: #00FF00;"></div>
          <div class="color-preset" data-color="#FFFF00" style="background-color: #FFFF00;"></div>
          <div class="color-preset" data-color="#FF00FF" style="background-color: #FF00FF;"></div>
          <div class="color-preset" data-color="#00FFFF" style="background-color: #00FFFF;"></div>
          <div class="color-preset" data-color="#FFFFFF" style="background-color: #FFFFFF;"></div>
        </div>
      </div>

      <div class="brush-tools">
        <label for="brush-size"><i class="fas fa-brush"></i> Fırça:</label>
        <input type="range" id="brush-size" min="1" max="30" value="5">
        <span id="brush-size-display">5px</span>
      </div>

      <div class="action-tools">
        <button id="undo-button" class="tool-button" disabled><i class="fas fa-undo"></i> Geri</button>
        <button id="redo-button" class="tool-button" disabled><i class="fas fa-redo"></i> İleri</button>
        <button id="clear-button" class="tool-button"><i class="fas fa-trash-alt"></i> Temizle</button>
        <button id="save-button" class="tool-button"><i class="fas fa-download"></i> Kaydet</button>
        <button id="share-button" class="tool-button"><i class="fas fa-share-alt"></i> Paylaş</button>
      </div>
    </div>

    <div class="shortcuts-info">
      <p>
        <span class="shortcut-key">Ctrl+Z</span> Geri Al &nbsp;
        <span class="shortcut-key">Ctrl+Y</span> Yeniden Yap &nbsp;
        <span class="tool-name" id="current-tool-name">Kalem</span> seçildi
      </p>
    </div>

    <div class="canvas-container">
      <canvas id="drawing-canvas"></canvas>
      <canvas id="temp-canvas"></canvas>
      <div id="cursors-layer"></div>
    </div>

    <div class="active-users-container">
      <h3><i class="fas fa-users"></i> Aktif Kullanıcılar</h3>
      <ul id="active-users-list"></ul>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/canvas.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
